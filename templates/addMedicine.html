{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add-Medicine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- QR SCANNER LIBRARY -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <link rel="stylesheet" href="{% static 'css/styleSheet.css' %}">
</head>

<body>
<header class="navbar fixed-top">
    <div class="logo">
        <a class="navbar-brand" href="/">
            <img src="{% static 'images/DoseCare_logo.png' %}" height="50">
        </a>
    </div>

    <div class="right">
        <button id="dark-mode-btn" class="dark-mode-toggle">
            <img id="theme-icon" src="https://img.icons8.com/ios/50/2563eb/moon-symbol.png">
        </button>

        <button class="emergency-btn">SOS</button>

        <div class="user-container">
            <div class="user">{{ request.user.username|slice:":2"|upper }}</div>
            <div class="dropdown-content">
                <a href="/logout/">Logout</a>
            </div>
        </div>
    </div> 
</header>

<button class="back-link">
    <span class="arrow" onclick="location.href='/dashboard/'">←Back to Dashboard</span>
</button> 

<div class="form-container">
<div class="card">
    <h2 class="head">Add New Medication</h2>
    <p class="subtitle">Enter the details below or scan the barcode.</p>
    <hr>

    <!-- Scanner UI (UNCHANGED) -->
    <div class="scanner-section mb-4">
        <div id="reader" style="width: 100%; display: none;"></div>
        <button id="scan-btn" class="btn2-con" style="width: 100%;">
            Scan Medicine Barcode
        </button>
    </div>

    <!-- DJANGO FORM -->
    <form method="POST">
        {% csrf_token %}

        <label>Medicine Name</label>
        <input id="medicine-name" type="text" name="name" placeholder="e.g. Paracetamol" required>

        <div class="row">
            <div>
                <label>Dosage Strength</label>
                <input type="text" name="dosage" placeholder="e.g. 10mg">
            </div>

            <div>
                <label>Frequency</label>
                <select>
                    <option>Once Daily</option>
                    <option>Twice Daily</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div>
                <label>Time of Day</label>
                <input type="time" name="time">
            </div>

            <div>
                <label>Stock</label>
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="Enter phone number" required>
                <input type="number">
            </div>
        </div>

        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="Enter phone number" required>

        <button type="submit" class="add-btn">+ Add Medicine</button>
    </form>

</div>
</div>

<script>
/* ---------------- QR SCANNER FUNCTIONALITY ---------------- */

let scannerRunning = false;
let html5QrCode;

document.getElementById("scan-btn").addEventListener("click", function () {

    const reader = document.getElementById("reader");

    if (!scannerRunning) {

        reader.style.display = "block";

        html5QrCode = new Html5Qrcode("reader");

        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {

                html5QrCode.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: 250
                    },
                    qrCodeMessage => {

                        console.log("Scanned:", qrCodeMessage);

                        html5QrCode.stop();
                        scannerRunning = false;
                        reader.style.display = "none";

                        // If QR contains link → redirect
                        if (qrCodeMessage.startsWith("http")) {
                            window.location.href = qrCodeMessage;
                        } 
                        // Otherwise fill medicine name
                        else {
                            document.getElementById("medicine-name").value = qrCodeMessage;
                        }

                    },
                    errorMessage => {
                        console.log(errorMessage);
                    }
                );

                scannerRunning = true;
            }
        }).catch(err => {
            console.error("Camera error:", err);
        });
    }
});
</script>

<script>
/* ---------------- DARK MODE (UNCHANGED) ---------------- */

const darkModeBtn = document.getElementById('dark-mode-btn');
const themeIcon = document.getElementById('theme-icon');
const body = document.body;

const setDarkMode = (isDark) => {
    if (isDark) {
        body.classList.add('dark-mode');
        themeIcon.src = 'https://img.icons8.com/ios/50/FFD700/sun--v1.png';
        localStorage.setItem('dosecare_theme', 'dark');
    } else {
        body.classList.remove('dark-mode');
        themeIcon.src = 'https://img.icons8.com/ios/50/2563eb/moon-symbol.png';
        localStorage.setItem('dosecare_theme', 'light');
    }
};

darkModeBtn.addEventListener('click', () => {
    setDarkMode(!body.classList.contains('dark-mode'));
});

if (localStorage.getItem('dosecare_theme') === 'dark') {
    setDarkMode(true);
}
</script>

</body>
</html>

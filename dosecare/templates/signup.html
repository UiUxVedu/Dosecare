{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DoseCare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styleSheet.css' %}">
</head>

<body>
    <header class="navbar fixed-top">
        <div class="logo">
            <a class="navbar-brand" href="/">
                <img src="{% static 'images/DoseCare_logo.png' %}" alt="DoseCare" height="50">
            </a>
        </div>
        <div class="right">
            <button id="dark-mode-btn" class="dark-mode-toggle" title="Toggle Dark Mode">
                <img id="theme-icon" src="https://img.icons8.com/ios/50/2563eb/moon-symbol.png" alt="dark mode">
            </button>
        </div>
    </header> 

    <div class="form-container" style="margin-top: 150px;">
        <div class="card" style="max-width: 450px;">
            <h2 class="text-center">Create Account</h2>
            <p class="subtitle text-center">Join 10,000+ users managing their health.</p>
            <hr>

            <!-- ✅ DJANGO FORM -->
            <form method="POST">
                {% csrf_token %}

                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Create password" required>

                <!-- OPTIONAL (UI SAME, just not used in backend yet) -->
                <label>Full Name</label>
                <input type="text" placeholder="John Doe">

                <label>Email Address</label>
                <input type="email" placeholder="name@example.com">

                <label>Confirm Password</label>
                <input type="password" placeholder="Repeat your password">

                <h5 class="mt-4" style="color: var(--text-color); font-weight: 600;">Emergency Contacts</h5>
                <p class="small text-muted">Required for the Emergency</p>

                <label>Contact 1</label>
                <div class="row">
                    <div class="col-5"><input type="text" placeholder="Name"></div>
                    <div class="col-7"><input type="tel" placeholder="Phone Number"></div>
                </div>

                <label>Contact 2</label>
                <div class="row">
                    <div class="col-5"><input type="text" placeholder="Name"></div>
                    <div class="col-7"><input type="tel" placeholder="Phone Number"></div>
                </div>

                <div class="form-check mt-3">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label" style="font-size: 12px; color: #818184;">
                        I agree to Terms & Privacy Policy
                    </label>
                </div>

                <button type="submit" class="add-btn" style="width: 100%; margin-top: 30px;">
                    Create Account
                </button>

                <!-- ERROR -->
                {% if error %}
                <p style="color:red; margin-top:10px;">{{ error }}</p>
                {% endif %}

                <p class="text-center mt-4" style="color: var(--text-muted); font-size: 16px;">
                    Already have an account? 
                    <a href="/login/" style="color: #2563eb; text-decoration: none; font-weight: 600;">
                        Login
                    </a>
                </p>
            </form>
        </div>
    </div>

    <script>
        // Dark Mode (UNCHANGED)
        const darkModeBtn = document.getElementById('dark-mode-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        const setDarkMode = (isDark) => {
            if (isDark) {
                body.classList.add('dark-mode');
                themeIcon.src = 'https://img.icons8.com/ios/50/FFD700/sun--v1.png';
                localStorage.setItem('dosecare_theme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                themeIcon.src = 'https://img.icons8.com/ios/50/2563eb/moon-symbol.png';
                localStorage.setItem('dosecare_theme', 'light');
            }
        };

        darkModeBtn.addEventListener('click', () => {
            setDarkMode(!body.classList.contains('dark-mode'));
        });

        if (localStorage.getItem('dosecare_theme') === 'dark') {
            setDarkMode(true);
        }
    </script>
</body>
</html>
